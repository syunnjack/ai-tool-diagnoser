<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIツール診断</title>
  <meta name="description" content="あなたに合ったAIツールを簡単診断。用途・予算・レベルからおすすめを提案します。" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>AIツール診断</h1>
      <p>
        5つの質問に答えるだけで、あなたに合うAIツールを提案します。
      </p>
    </header>

    <section id="quiz-section" class="card">
      <div class="progress-wrap">
        <div id="progress-text">質問 1 / 5</div>
        <div class="progress-bar">
          <div id="progress-fill"></div>
        </div>
      </div>

      <div id="question-container"></div>

      <div class="actions">
        <button id="prev-btn" class="secondary" disabled>戻る</button>
        <button id="next-btn" class="primary" disabled>次へ</button>
      </div>
    </section>

    <section id="result-section" class="card hidden">
      <h2>診断結果</h2>
      <p id="result-summary"></p>
      <div id="results"></div>

      <div class="actions result-actions">
        <button id="restart-btn" class="secondary">もう一度診断する</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
